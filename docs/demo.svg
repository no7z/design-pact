<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f4f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="500" rx="16" fill="url(#bg)" stroke="#e4e4e7"/>

  <!-- window chrome -->
  <g transform="translate(0,0)">
    <circle cx="34" cy="34" r="6" fill="#e4e4e7"/>
    <circle cx="56" cy="34" r="6" fill="#e4e4e7"/>
    <circle cx="78" cy="34" r="6" fill="#e4e4e7"/>
  </g>

  <!-- title -->
  <text x="600" y="110" text-anchor="middle" font-size="42" font-weight="700" fill="#18181b">design-system</text>
  <text x="600" y="150" text-anchor="middle" font-size="19" fill="#71717a">给「用 AI 生成页面的人」的设计系统工具</text>

  <!-- play button placeholder -->
  <g filter="url(#shadow)">
    <circle cx="600" cy="250" r="46" fill="#18181b"/>
    <path d="M586 228 L586 272 L622 250 Z" fill="#ffffff"/>
  </g>
  <text x="600" y="330" text-anchor="middle" font-size="14" fill="#a1a1aa">▶ 演示占位 —— 用一段录屏替换 docs/demo.gif</text>

  <!-- three-step flow -->
  <g transform="translate(0,390)">
    <!-- step 1 -->
    <rect x="120" y="0" width="290" height="72" rx="12" fill="#ffffff" stroke="#e4e4e7"/>
    <circle cx="152" cy="36" r="15" fill="#4f46e5"/>
    <text x="152" y="41" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1</text>
    <text x="180" y="32" font-size="15" font-weight="600" fill="#18181b">装 skill</text>
    <text x="180" y="52" font-size="12" fill="#71717a">npx skills add no7z/design-system</text>

    <!-- arrow -->
    <path d="M430 36 L460 36" stroke="#d4d4d8" stroke-width="2" marker-end="url(#a)"/>

    <!-- step 2 -->
    <rect x="470" y="0" width="260" height="72" rx="12" fill="#ffffff" stroke="#e4e4e7"/>
    <circle cx="502" cy="36" r="15" fill="#4f46e5"/>
    <text x="502" y="41" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2</text>
    <text x="530" y="32" font-size="15" font-weight="600" fill="#18181b">agent 出配色 → 微调</text>
    <text x="530" y="52" font-size="12" fill="#71717a">在网页里选一套、可视化调 tokens</text>

    <!-- arrow -->
    <path d="M750 36 L780 36" stroke="#d4d4d8" stroke-width="2" marker-end="url(#a)"/>

    <!-- step 3 -->
    <rect x="790" y="0" width="290" height="72" rx="12" fill="#ffffff" stroke="#e4e4e7"/>
    <circle cx="822" cy="36" r="15" fill="#4f46e5"/>
    <text x="822" y="41" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">3</text>
    <text x="850" y="32" font-size="15" font-weight="600" fill="#18181b">导出 design.md</text>
    <text x="850" y="52" font-size="12" fill="#71717a">agent 照它生成 UI</text>
  </g>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#d4d4d8"/>
    </marker>
  </defs>
</svg>
