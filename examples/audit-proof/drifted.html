<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audit proof · drifted</title>
    <style>
:root {
  --color-background: #ffffff;
  --color-foreground: #16181d;
  --color-primary: #2f6df6;
  --color-accent: #7c3aed;
  --color-muted: #6b7280;
  --color-border: #e5e7eb;
  --color-success: #16a34a;
  --color-warning: #d97706;
  --color-error: #dc2626;
  --color-info: #2563eb;
  --font-family-body: Inter, system-ui, sans-serif;
  --font-family-heading: Inter, system-ui, sans-serif;
  --font-weight: 400;
  --font-weight-heading: 600;
  --font-weight-bold: 700;
  --line-height: 1.5;
  --letter-spacing: 0em;
  --font-size-h1: 3.052rem;
  --font-size-h2: 2.441rem;
  --font-size-h3: 1.953rem;
  --font-size-h4: 1.563rem;
  --font-size-h5: 1.25rem;
  --font-size-body: 1rem;
  --font-size-small: 0.8rem;
  --font-size-caption: 0.64rem;
  --spacing-xxs: 4px;
  --spacing-xs: 8px;
  --spacing-sm: 12px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
  --spacing-xxl: 48px;
  --spacing-section: 96px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;
  --border-default: 1px;
  --border-strong: 2px;
  --shadow-sm: 0 1px 4px 0 rgba(0,0,0,0.040);
  --shadow-md: 0 4px 12px 0 rgba(0,0,0,0.080);
  --shadow-lg: 0 8px 24px 0 rgba(0,0,0,0.120);
  --duration-micro: 80ms;
  --duration-fast: 150ms;
  --duration-normal: 200ms;
  --duration-slow: 300ms;
  --duration-page: 500ms;
  --easing-standard: cubic-bezier(0.0, 0, 0.2, 1);
  --opacity-hover: 0.08;
  --opacity-pressed: 0.12;
  --opacity-focus: 0.16;
  --opacity-disabled: 0.38;
  --opacity-overlay: 0.5;
}
    </style>
    <style>
      * { box-sizing: border-box; }
      body {
        /* grid centering, not margin auto: computed auto margins resolve to px
           and would be flagged as off-grid spacing by the audit */
        display: grid;
        justify-content: center;
        margin: 0;
        background: var(--color-background);
        color: var(--color-foreground);
        font-family: var(--font-family-body);
        font-size: 19px;
        font-weight: var(--font-weight);
        line-height: var(--line-height);
      }
      main { width: 960px; padding: var(--spacing-xl); }
      h1 {
        font-family: var(--font-family-heading);
        font-size: var(--font-size-h2);
        font-weight: var(--font-weight-heading);
        line-height: var(--line-height);
        margin: 0 0 var(--spacing-sm);
      }
      .lede { color: #777777; margin: 0 0 26px; }
      .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-md); }
      .card {
        background: #fafbfc;
        border: var(--border-thin) solid var(--color-border);
        border-radius: 13px;
        padding: 18px;
      }
      .card h2 {
        font-family: var(--font-family-heading);
        font-size: 27px;
        font-weight: var(--font-weight-heading);
        line-height: var(--line-height);
        margin: 0 0 var(--spacing-xs);
      }
      .card p { color: var(--color-muted); margin: 0 0 var(--spacing-md); }
      .price {
        font-size: var(--font-size-h4);
        font-weight: var(--font-weight-bold);
        margin: 0 0 var(--spacing-md);
      }
      .cta {
        display: inline-block;
        background: #ff6b35;
        color: var(--color-background);
        font-family: var(--font-family-body);
        font-size: var(--font-size-body);
        font-weight: var(--font-weight-heading);
        line-height: var(--line-height);
        border: 0;
        border-radius: 5px;
        padding: 7px 18px;
      }
      .badge {
        display: inline-block;
        background: var(--color-accent);
        color: var(--color-background);
        font-size: var(--font-size-small);
        border-radius: var(--radius-sm);
        padding: 0 var(--spacing-xs);
        margin: 0 0 var(--spacing-xs);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ship UI that keeps its promises</h1>
      <p class="lede">Three plans. One design contract. The audit decides who kept it.</p>
      <section class="cards">
        <article class="card">
          <h2>Starter</h2>
          <p>For side projects and quick experiments.</p>
          <p class="price">$0</p>
          <a class="cta" href="#">Get started</a>
        </article>
        <article class="card">
          <span class="badge">Popular</span>
          <h2>Pro</h2>
          <p>For teams that audit every deploy.</p>
          <p class="price">$12</p>
          <a class="cta" href="#">Choose Pro</a>
        </article>
        <article class="card">
          <h2>Scale</h2>
          <p>For platforms with many surfaces.</p>
          <p class="price">$49</p>
          <a class="cta" href="#">Talk to us</a>
        </article>
      </section>
    </main>
  </body>
</html>
